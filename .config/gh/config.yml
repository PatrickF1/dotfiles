# What protocol to use when performing git operations. Supported values: ssh, https
git_protocol: ssh
# What editor gh should run when creating issues, pull requests, etc. If blank, will refer to environment.
editor: code --wait
# Aliases allow you to create nicknames for gh commands
aliases:
  aliases: alias list
  co: pr checkout
  open: repo view --web
  pv: pr view --web
  pc: pr create --web
  # Prune local branches (and their worktrees) once their PR is squash-merged.
  # Skips worktrees with uncommitted changes; never touches the main worktree.
  prune-merged: |-
    !git for-each-ref --format='%(refname:short) %(worktreepath)' refs/heads/ |
    while read -r b wt; do
      case "$b" in main|master) continue;; esac
      state=$(gh pr list --head "$b" --state merged --limit 1 --json state --jq '.[0].state' 2>/dev/null)
      if [ "$state" != "MERGED" ]; then
        continue
      fi
      if [ -n "$wt" ]; then
        git worktree remove "$wt" || continue
      fi
      git branch -D "$b"
    done
