# What protocol to use when performing git operations. Supported values: ssh, https
git_protocol: ssh
# What editor gh should run when creating issues, pull requests, etc. If blank, will refer to environment.
editor: code --wait
# Aliases allow you to create nicknames for gh commands
aliases:
    aliases: alias list
    co: pr checkout
    open: repo view --web
    # Augments `gh pr view --web`: in addition to PR number/URL/branch,
    # also accepts a commit-ish and looks up its associated PR.
    pv: |-
        !arg="$1"
        if [ -z "$arg" ]; then
          exec gh pr view --web
        fi
        gh pr view --web "$arg" 2>/dev/null && exit
        sha=$(git rev-parse --verify "$arg" 2>/dev/null) || sha="$arg"
        pr=$(gh api "repos/{owner}/{repo}/commits/$sha/pulls" --jq '.[0].number' 2>/dev/null)
        if printf '%s' "$pr" | grep -qE '^[0-9]+$'; then
          gh pr view --web "$pr"
        else
          echo "No PR found for $arg" >&2
          exit 1
        fi
    pc: pr create --web
    # Prune local branches (and their worktrees) whose work is done, against the
    # remote's actual default branch (main/master/etc. — detected, not assumed).
    # A branch is deletable if EITHER all its commits are already in the default
    # branch (any merge style, including squash — name-agnostic) OR its PR
    # (matched by head name) is MERGED/CLOSED. Skips branches with unmerged
    # commits and no closed PR, skips worktrees that won't cleanly remove
    # (e.g. dirty/untracked), and never touches the default branch or m.
    prune-done: |-
        !remote=origin
        git fetch "$remote" --prune --quiet
        base=$(git symbolic-ref --quiet --short "refs/remotes/$remote/HEAD" 2>/dev/null)
        if [ -z "$base" ]; then
          git remote set-head "$remote" --auto >/dev/null 2>&1
          base=$(git symbolic-ref --quiet --short "refs/remotes/$remote/HEAD" 2>/dev/null)
        fi
        if [ -z "$base" ]; then
          db=$(gh repo view --json defaultBranchRef --jq '.defaultBranchRef.name' 2>/dev/null)
          case "$db" in ''|*[!A-Za-z0-9._/-]*) db= ;; esac
          [ -n "$db" ] && base="$remote/$db"
        fi
        # Never guess: the base must resolve to a real commit, else abort without deleting.
        if [ -z "$base" ] || ! git rev-parse --verify --quiet "$base^{commit}" >/dev/null 2>&1; then
          echo "prune-done: cannot determine default branch for $remote" >&2; exit 1
        fi
        def=${base#$remote/}
        git for-each-ref --format='%(refname:short) %(worktreepath)' refs/heads/ |
        while read -r b wt; do
          case "$b" in m|main|master|"$def") continue;; esac
          if [ -z "$(git rev-list "$base..$b" 2>/dev/null)" ]; then
            reason="in $def"
          else
            state=$(gh pr list --head "$b" --state all --limit 1 --json state --jq '.[0].state' 2>/dev/null)
            case "$state" in
              MERGED|CLOSED) reason="PR $state" ;;
              *) continue ;;
            esac
          fi
          if [ -n "$wt" ]; then
            git worktree remove "$wt" || continue
          fi
          git branch -D "$b" && echo "pruned $b ($reason)"
        done
version: "1"
