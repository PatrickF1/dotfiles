# What protocol to use when performing git operations. Supported values: ssh, https
git_protocol: ssh
# What editor gh should run when creating issues, pull requests, etc. If blank, will refer to environment.
editor: code --wait
# Aliases allow you to create nicknames for gh commands
aliases:
  aliases: alias list
  co: pr checkout
  open: repo view --web
  pv: pr view --web
  pc: pr create --web
  # Prune local branches that have already been squash-merged into main/master
  prune-merged: >-
    !git for-each-ref --format='%(refname:short)' refs/heads/ |
    grep -vE '^(main|master)$' |
    while read -r b; do
      state=$(gh pr list --head "$b" --state merged --limit 1 --json state --jq '.[0].state' 2>/dev/null);
      [ "$state" = "MERGED" ] && git branch -D "$b";
    done
